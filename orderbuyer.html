<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buyer Tracking Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body,html{
    overflow-x: hidden;
}
body {
    background:#f4f7fc;
    font-family:'Segoe UI';
}
.sidebar {
    position:fixed;
    width:260px;
    height:100%;
    background:#0f172a;
    color:white;
    padding:20px;
    transition:.3s;
    z-index:1000;
}

.sidebar a {
    display:block;
    padding:12px;
    color:#cbd5e1;
    margin-bottom:10px;
    border-radius:8px;
    text-decoration: none;
}

.sidebar a:hover {
    background:#1e293b;
    color:#ffcc00;
}

#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:999;
}

.main {
    margin-left:260px;
    padding:20px;
}

.topbar {
    background:white;
    padding:15px;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}


.table-box {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

.progress {
    height:10px;
    border-radius:10px;
    background:#ddd;
}
.progress-bar {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#28a745,#00c6ff);
}

.road {
    width:100%;
    height:60px;
    background:#eee;
    border-radius:30px;
    position:relative;
}

.truck {
    position:absolute;
    left:0;
    top:15px;
    font-size:30px;
    transition:1s;
}

.map iframe {
    width:100%;
    height:250px;
    border-radius:12px;
}


.notify {
    position:fixed;
    top:20px;
    right:20px;
    background:#2f4b7c;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    display:none;
}

/* ===== MOBILE ===== */
.toggle-btn {display:none;}

@media(max-width:768px){
    .sidebar{left:-260px;}
    .sidebar.active{left:0;}
    .main{margin-left:0;}
    .toggle-btn{display:block;}
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<h4>Buyer Panel</h4>
<a href="buyerdashboard.html">Dashboard</a>
<a href="orderbuyer.html">Orders</a>
<a href="index.html">Back to Home</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div id="overlay" onclick="closeSidebar()"></div>


<div class="main">

<div class="topbar">
<span class="toggle-btn" onclick="toggleSidebar()">☰</span>
<h5 id="welcome"></h5>
<i class="bi bi-bell" onclick="showNotify()"></i>
</div>


<div class="table-box">
<h5>Orders</h5>

<table class="table">
<tr><th>ID</th><th>Product</th><th>Status</th><th>Action</th></tr>

<tr>
<td>#101</td>
<td>A4 Paper</td>
<td>Completed</td>
<td><button onclick="track('completed')" class="btn btn-success btn-sm">Track</button></td>
</tr>

<tr>
<td>#102</td>
<td>Kraft</td>
<td>Processing</td>
<td><button onclick="track('processing')" class="btn btn-warning btn-sm">Track</button></td>
</tr>

<tr>
<td>#103</td>
<td>Notebook</td>
<td>Delayed</td>
<td><button onclick="track('delayed')" class="btn btn-danger btn-sm">Track</button></td>
</tr>

</table>
</div>

<div class="table-box" id="trackBox" style="display:none;">
<h5>Live Tracking</h5>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="road mt-3">
<div class="truck" id="truck">🚚</div>
</div>

<p class="mt-2">ETA: <span id="eta"></span></p>

<div class="map mt-3">
<iframe src="https://maps.google.com/maps?q=Salem&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

</div>

</div>

<div class="notify" id="notify">Order Update Received 🚚</div>

<script>


document.getElementById("welcome").innerText =
"Welcome " + (localStorage.getItem("userEmail") || "Buyer");

function toggleSidebar(){
let s=document.getElementById("sidebar");
let o=document.getElementById("overlay");
s.classList.toggle("active");
o.style.display=s.classList.contains("active")?"block":"none";
}

function closeSidebar(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").style.display="none";
}

function track(status){

let progress=0;
let time=0;

if(status==="completed"){progress=100;time=0;}
if(status==="processing"){progress=70;time=10;}
if(status==="delayed"){progress=40;time=20;}

document.getElementById("trackBox").style.display="block";
document.getElementById("bar").style.width=progress+"%";
document.getElementById("truck").style.left=progress+"%";

let eta=document.getElementById("eta");

if(time===0){
eta.innerText="Delivered";
}else{
eta.innerText=time+" sec";
let interval=setInterval(()=>{
time--;
eta.innerText=time+" sec";
if(time<=0){
clearInterval(interval);
eta.innerText="Delivered";
document.getElementById("bar").style.width="100%";
document.getElementById("truck").style.left="100%";
}
},1000);
}

showNotify();
}

function showNotify(){
let n=document.getElementById("notify");
n.style.display="block";
setTimeout(()=>{n.style.display="none";},3000);
}
function logout(){
localStorage.clear();
window.location.href="index.html";
}

</script>

</body>
</html>
