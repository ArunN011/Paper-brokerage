<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="register.css">
</head>

<body>

<div class="register-wrapper">

  <div class="register-card">

    <h3 class="text-center mb-3">Create Account</h3>

   
    <select class="form-select mb-3" id="role">
      <option disabled selected>Select Role</option>
      <option>Dealer</option>
      <option>Buyer</option>
    </select>

  
    <input type="email" class="form-control mb-3" placeholder="Email" id="email">

    <input type="password" class="form-control mb-3" placeholder="Password" id="password">

  
    <div class="password-box">
      <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" >
      <i class="bi bi-eye-slash" id="toggleConfirm"></i>
    </div>

  
    <button class="btn signup-btn w-100 mt-3" onclick="signup()">Sign Up</button>

   
    <p class="text-center mt-3">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>

  <!-- BACK -->
  <a href="index.html" class="back-home">← Back to Home</a>

</div>

<script>


const toggleConfirm = document.getElementById("toggleConfirm");
const confirmPassword = document.getElementById("confirmPassword");

toggleConfirm.addEventListener("click", () => {
    const type = confirmPassword.getAttribute("type") === "password" ? "text" : "password";
    confirmPassword.setAttribute("type", type);

    toggleConfirm.classList.toggle("bi-eye");
    toggleConfirm.classList.toggle("bi-eye-slash");
});


function signup() {

    const btn = document.querySelector(".signup-btn");
     const role = document.getElementById("role").value;
    const email = document.getElementById("email").value;
    const conform=document.getElementById("confirmPassword").value;
    const pass=document.getElementById("password").value;


    if(role === "" || email === ""||pass===""||conform===""){
        alert("Please fill all fields");
        return;
    }

    btn.innerText = "Creating Account...";
    btn.style.background = "#4CAF50";

    setTimeout(() => {
        btn.innerText = "Account Created ✓";
    }, 1500);

    setTimeout(() => {
        window.location.href = "login.html";
    }, 2500);
}

</script>

</body>
</html>
