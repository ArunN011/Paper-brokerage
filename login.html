<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-wrapper">

  <div class="login-card">

    <h3 class="text-center mb-3">Broker Login</h3>


        <select class="form-select mb-3" id="role">
          <option  disabled selected>Select Role</option>
         <option value="dealer">Dealer</option>
         <option value="buyer">Buyer</option>
        </select>

    
    <input type="text" class="form-control mb-3" id="email" placeholder="Username / Email" >

   
    <div class="password-box">
      <input type="password" id="password" class="form-control" placeholder="Password" >
      <i class="bi bi-eye-slash" id="togglePassword"></i>
    </div>

  
    <button class="btn login-btn w-100 mt-3" onclick="login()">Login to Dashboard</button>

    <p class="text-center mt-3">
      Don’t have an account? <a href="register.html">Create Account</a>
    </p>

  </div>

  
  <a href="index.html" class="back-home">
    ← Back to Home
  </a>

</div>

<script>


const toggle = document.getElementById("togglePassword");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {
    const type = password.getAttribute("type") === "password" ? "text" : "password";
    password.setAttribute("type", type);

    toggle.classList.toggle("bi-eye");
    toggle.classList.toggle("bi-eye-slash");
});
function login() {

    const role = document.getElementById("role").value;
    const email = document.getElementById("email").value;
    const btn = document.querySelector(".login-btn");
    const pass=document.getElementById("password").value;


    if(role === "" || email === ""||pass===""){
        alert("Please fill all fields");
        return;
    }

   
    localStorage.setItem("userEmail", email);
    localStorage.setItem("userRole", role);

    btn.innerText = "Logging in...";
    btn.style.background = "#4CAF50";

    setTimeout(() => {

        if(role === "dealer"){
            window.location.href = "dealerdashboard.html";
        }
        else if(role === "buyer"){
            window.location.href = "buyerdashboard.html";
        }

    }, 1500);
}


</script>
</body>
</html>
